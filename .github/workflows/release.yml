name: Release

on:
 push:
  tags:
   - "v*"
 workflow_dispatch:

# Trusted Publisher setup for npm
# Requires: id-token: write + package configured in npmjs.com
permissions:
 contents: read
 id-token: write # Required for provenance + trusted publisher

jobs:
 release:
  name: Release
  runs-on: ubuntu-latest
  environment:
   name: npm-publish
   url: https://www.npmjs.com/package/@biglogic/rgs
  steps:
   - name: Checkout Repository
     uses: actions/checkout@v6
     with:
      fetch-depth: 0

   - name: Setup Node.js
     uses: actions/setup-node@v6
     with:
      node-version: "20"

   - name: Install dependencies
     run: npm ci

   - name: Build package
     run: npm run build

   - name: Install test dependencies
     working-directory: ./tests
     run: npm ci

   - name: Generate .npmrc
     run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc

   - name: Run tests
     working-directory: ./tests
     run: npm test

   - name: Publish to npm
     run: npm publish
     env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

   - name: Generate changelog
     id: changelog
     run: |
      CHANGELOG=$(git log --pretty=format:"%s (%h)" ${{ github.event.inputs.previous_tag || '' }}..${{ github.ref_name }})
      echo "body=$CHANGELOG" >> $GITHUB_OUTPUT

   - name: Create GitHub Release
     uses: softprops/action-gh-release@v2
     with:
      body: ${{ steps.changelog.outputs.body }}
      draft: false
      prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
     env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
