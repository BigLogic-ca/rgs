name: Release

on:
 push:
  tags:
   - "v*"
 workflow_dispatch:

  # Trusted Publisher setup for npm
  # Requires: id-token: write + package configured in npmjs.com
permissions:
 id-token: write # Required for OIDC
 contents: write

jobs:
 release:
  name: Release
  runs-on: ubuntu-latest

  environment:
   name: npm-publish
   url: https://www.npmjs.com/package/@biglogic/rgs

  steps:
   - name: Checkout Repository
     uses: actions/checkout@v6

   - name: Setup Node.js
     uses: actions/setup-node@v6
     with:
      node-version: "24"
      registry-url: "https://registry.npmjs.org"

   - name: Install dependencies
     run: npm ci

   - name: Config git metadata
     run: |
      git config --global user.name 'Dario Passariello'
      git config --global user.email 'dariopassariello@gmail.com'

   - name: Build package
     run: npm run build

   - name: Install test dependencies
     working-directory: ./tests
     run: npm ci

   - name: Run tests
     working-directory: ./tests
     run: npm test

   - name: Generate .npmrc
     run: |
      echo '//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}' > .npmrc
      cp .npmrc dist/.npmrc

   - name: Publish to npm
     working-directory: ./dist
     run: npm publish --access=public
     env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

   - name: Generate changelog
     id: changelog
     run: |
      CHANGELOG=$(git log --pretty=format:"%s (%h)" ${{ github.event.inputs.previous_tag || '' }}..${{ github.ref_name }})
      echo "body=$CHANGELOG" >> $GITHUB_OUTPUT

   - name: Create GitHub Release
     uses: softprops/action-gh-release@v2
     with:
      body: ${{ steps.changelog.outputs.body }}
      draft: false
      prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name,
       'beta') || contains(github.ref_name, 'rc') }}
     env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
