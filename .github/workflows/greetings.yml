name: Greetings

on:
  pull_request_target:
   types: [opened, reopened]
  issues:
   types: [opened]

jobs:
  greeting:
   name: Greeting
   runs-on: ubuntu-latest
   permissions:
    issues: write
    pull-requests: write
   steps:
    - uses: actions/first-interaction@v3
      with:
       repo-token: ${{ secrets.GITHUB_TOKEN }}
       issue_message: "🎉 Thanks for opening a new issue! We appreciate your contribution to **${{ github.repository }}**. Please make sure you've read the documentation and searched for existing issues. Our team will review your issue and get back to you soon!"
       pr_message: "🎉 Thanks for your first pull request to **${{ github.repository }}**! Please review our Contributing Guidelines and make sure you've added tests, updated documentation, and followed the code style guide. Our team will review your PR and provide feedback!"
